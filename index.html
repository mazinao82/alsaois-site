<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>شركة السحيب</title>
  <meta name="robots" content="index,follow">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    :root{--bg:#ffffff;--accent:#0b6b3a}
    html,body{height:100%;margin:0;font-family:Arial, "Noto Naskh Arabic", sans-serif;background:var(--bg);color:#222}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
    .card{text-align:center;max-width:900px;width:100%}
    .logo{display:inline-block;max-width:420px;width:60%;height:auto;image-rendering:optimizeQuality}
    .caption{margin-top:18px;color:#666;font-size:14px}
    @media (max-width:480px){.logo{width:80%;max-width:320px}}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main" aria-labelledby="company-name">
      <h1 id="company-name" class="sr-only">شركة عبدالعزيز وعبدالله محمد السحيب</h1>
      <img class="logo" src="logo.png" alt="شعار شركة السحيب للخرسانة الجاهزة والمنتجات الاسمنتية">
      <div class="caption" aria-hidden="true">شركة السحيب للخرسانة الجاهزة والمنتجات الاسمنتية</div>
    </div>
  </div>
</body>
</html>
